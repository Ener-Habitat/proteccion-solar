name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Permite un único despliegue concurrente.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar (y habilitar) GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5

      - name: Exportar sitio Shinylive (solo archivos de runtime)
        run: |
          mkdir -p build
          cp app.py requirements.txt build/
          cp -r solar charts build/
          uv run shinylive export build _site

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
